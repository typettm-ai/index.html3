<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>車検証税額チェッカー 永久保存版 (1ファイル完全完結)</title>
    <!-- Tesseract.js（OCRライブラリ）の読み込み -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #f5f5f5; }
        h1 {font-size: 28px; }
        .card {background: white; border-radius: 12px; padding: 16px; margin-top: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        input[type="file"], select {width: 100%; margin-top: 12px; box-sizing: border-box; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        
        /* 手動修正用の入力欄のスタイル */
        .input-inline {width: 120px; padding: 8px; margin: 4px 8px 4px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;}
        .text-right { text-align: right; }
        .text-left { text-align: left; }
        
        /* 実行ボタンのスタイル */
        .btn-submit {width: 100%; margin-top: 16px; padding: 14px; font-size: 18px; font-weight: bold; color: white; background-color: #0066cc; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.2); transition: background 0.2s; }
        .btn-submit:hover {background-color: #0052a3; }
        .btn-submit:disabled {background-color: #cccccc; cursor: not-allowed; box-shadow: none; }

        .result {font-size: 18px; line-height: 2; }
        .status {font-weight: bold; color: #333; }
        .monthly-box {background: #f0f7ff; border-left: 4px solid #0066cc; padding: 12px; margin-top: 12px; font-size: 16px; border-radius: 0 8px 8px 0; line-height: 1.6; }
        .select-container {margin-top: 8px; margin-bottom: 8px; }
        
        /* 状態表示バッジ */
        .badge-ev { background: #e0f7fa; color: #00838f; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; display: inline-block; margin-left: 8px; }
        .badge-eco { background: #e6f4ea; color: #137333; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; display: inline-block; margin-left: 8px; }
        .badge-diesel { background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; display: inline-block; margin-left: 8px; }
    </style>
</head>
<body>
    <h1>車検証税額チェッカー 永久保存版</h1>
    <p>画像は端末内のみで処理されます（自動で現在の年度に合わせた重課判定を行います）。</p>

    <!-- 設定カード -->
    <div class="card">
        <div class="select-container">
            <label style="font-weight: bold;" for="carTypeSelect">1. 車種区分を選択：</label>
            <select id="carTypeSelect">
                <option value="passenger">乗用車 (3 / 5ナンバー等)</option>
                <option value="cargo">貨物車・トラック (1 / 4ナンバー等)</option>
                <option value="special_camping">8ナンバー：キャンピング車</option>
                <option value="special_other">8ナンバー：その他特種用途 (事務室・宣伝車等)</option>
            </select>
        </div>

        <label style="font-weight: bold; display: block; margin-top: 16px;">2. 車検証画像を選択：</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <div class="select-container" style="margin-top: 16px;">
            <label style="font-weight: bold;" for="monthSelect">3. 新規登録する月を指定：</label>
            <select id="monthSelect">
                <option value="4">4月登録 (5月〜翌3月の11ヶ月分)</option>
                <option value="5">5月登録 (6月〜翌3月の10ヶ月分)</option>
                <option value="6">6月登録 (7月〜翌3月の9ヶ月分)</option>
                <option value="7">7月登録 (8月〜翌3月の8ヶ月分)</option>
                <option value="8">8月登録 (9月〜翌3月の7ヶ月分)</option>
                <option value="9">9月登録 (10月〜翌3月の6ヶ月分)</option>
                <option value="10">10月登録 (11月〜翌3月の5ヶ月分)</option>
                <option value="11">11月登録 (12月〜翌3月の4ヶ月分)</option>
                <option value="12">12月登録 (1月〜翌3月の3ヶ月分)</option>
                <option value="1">1月登録 (2月〜翌3月の2ヶ月分)</option>
                <option value="2">2月登録 (3月の1ヶ月分)</option>
                <option value="3">3月登録 (当期分なし・0円)</option>
            </select>
        </div>
        <button type="button" id="submitBtn" class="btn-submit">画像を読み取る</button>
    </div>

    <div class="card">
        <div id="status" class="status">画像を選択して「画像を読み取る」を押してください</div>
    </div>

    <!-- 抽出された結果と税額を表示 -->
    <div class="card result">
        <h2>抽出結果（手動修正も可能）</h2>
        <small style="color: #666; display: block; margin-bottom: 12px; line-height: 1.4;">
            ※値を変更すると、税額へリアルタイムに自動反映されます。
        </small>

        <label for="modelInput">型式（頭の3桁）：</label> 
        <input type="text" id="modelInput" class="input-inline text-left" style="width: 150px;" placeholder="例: 3DA"> 
        <span id="badgeArea"></span><br>

        <label for="firstRegYearSelect">初度登録年月：</label> 
        <select id="firstRegYearSelect" class="input-inline text-left" style="width: 320px; display: inline-block; margin-top: 0;"></select>
        <span id="taxCategoryBadge" style="font-size: 14px; font-weight: bold; margin-left: 4px;"></span> <br>

        <!-- 支払年数 -->
        <label for="weightTaxTermSelect">重量税の支払年数：</label> 
        <select id="weightTaxTermSelect" class="input-inline text-left" style="width: 240px; display: inline-block; margin-top: 0;">
            <option value="1">1年分 (トラック・大型特種など)</option>
            <option value="2" selected>2年分 (乗用・キャンピング・小型特種など)</option>
            <option value="3">3年分 (新車登録など)</option>
        </select> <br>
        
        <!-- 各種入力フィールド -->
        <div id="ccField">
            <label for="ccInput">総排気量：</label> 
            <input type="number" step="0.01" id="ccInput" class="input-inline text-right" placeholder="例: 1.99"> L <br>
        </div>

        <div id="weightField">
            <label for="weightInput">車両重量：</label> 
            <input type="number" id="weightInput" class="input-inline text-right" placeholder="例: 1600"> kg <br>
        </div>

        <div id="maxLoadField" style="display: none;">
            <label for="maxLoadInput">最大積載量：</label> 
            <input type="number" id="maxLoadInput" class="input-inline text-right" placeholder="例: 2000"> kg <br>
        </div>

        <div id="totalWeightField" style="display: none;">
            <label for="totalWeightInput">車両総重量：</label> 
            <input type="number" id="totalWeightInput" class="input-inline text-right" placeholder="例: 4450"> kg <br>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <strong>重量税(<span id="weightTaxTermLabel">2</span>年分)： <span id="weightTax">-</span></strong>
        <span id="weightTaxCategoryLabel" style="font-size: 14px; color: #666; margin-left: 8px;"></span><br>
        
        <strong>自動車税（種別割）年額： <span id="carTaxYearly">-</span></strong>
        
        <!-- 月割り金額 of 自動車税 -->
        <div class="monthly-box">
            <strong>自動車税（種別割）月割り計算結果：</strong><br>
            <span id="carTaxMonthly">条件を入力し計算を実行すると表示されます</span><br>
            <small style="color: #666;" id="monthlyNotice">※普通車は登録月の翌月から3月までの残り月数で計算します。</small>
        </div>
    </div>

<script>
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const carTypeSelect = document.getElementById("carTypeSelect");

const ccField = document.getElementById("ccField");
const weightField = document.getElementById("weightField");
const maxLoadField = document.getElementById("maxLoadField");
const totalWeightField = document.getElementById("totalWeightField");

const weightTaxTermSelect = document.getElementById("weightTaxTermSelect");
const weightTaxTermLabel = document.getElementById("weightTaxTermLabel");
const monthlyNotice = document.getElementById("monthlyNotice");

let currentYearlyTax = 0; 
let selectedFile = null;  

const evPrefixes = ["ZAA", "ZAB", "ZBA", "ZLA", "EAA", "CAA"];
const ecoPrefixes = ["6AA", "4AA", "5AA", "3AA", "DAA"];
const dieselPrefixes = ["3DA", "1DA", "QDF", "3DF", "LDA", "LDF", "ADF", "BDF", "CDA", "FDA", "SDA"];

// ★ 年式選択をスッキリ簡素化する処理
function initYearSelect() {
    const select = document.getElementById("firstRegYearSelect");
    select.innerHTML = "";
    const currentYear = new Date().getFullYear();
    
    // 普段よく使う直近15年を上部にまとめる
    const groupRecent = document.createElement("optgroup");
    groupRecent.label = "--- 直近15年 ---";
    for (let y = currentYear; y >= (currentYear - 14); y--) {
        if (y === 2019) {
            groupRecent.add(new Option("令和元年(2019) 10月以降 ［新税率］", "2019_10"));
        } else {
            let w = (y >= 2019) ? `令和${y - 2018}` : `平成${y - 1988}`;
            groupRecent.add(new Option(`${w}年 (${y}年)`, y.toString()));
        }
    }
    select.add(groupRecent);

    // 古い年式はスクロールの邪魔にならないよう下に分ける
    const groupOld = document.createElement("optgroup");
    groupOld.label = "--- それ以前 ---";
    groupOld.add(new Option("令和元年/平成31年(2019) 9月以前", "2019_9"));
    for (let y = (currentYear - 15); y >= 1990; y--) {
        let w = (y > 1988) ? `平成${y - 1988}` : `昭和${y - 1925}`;
        groupOld.add(new Option(`${w}年 (${y}年)`, y.toString()));
    }
    groupOld.add(new Option("昭和63年以前", "1988"));
    select.add(groupOld);
}
initYearSelect();

const inputs = ["modelInput", "firstRegYearSelect", "weightTaxTermSelect", "ccInput", "weightInput", "maxLoadInput", "totalWeightInput", "monthSelect"];
inputs.forEach(id => {
    document.getElementById(id).addEventListener("input", handleInputChange);
    document.getElementById(id).addEventListener("change", handleInputChange);
});

function handleInputChange(e) {
    const type = carTypeSelect.value;
    if (type === "special_other" && e.target && e.target.id === "totalWeightInput") {
        const totalWeight = parseInt(e.target.value) || 0;
        if (totalWeight > 0) {
            weightTaxTermSelect.value = (totalWeight < 3000) ? "2" : "1";
        }
    }
    calculateTaxes();
}

carTypeSelect.addEventListener("change", function() {
    const type = this.value;
    
    ccField.style.display = "none";
    weightField.style.display = "none";
    maxLoadField.style.display = "none";
    totalWeightField.style.display = "none";

    if (type === "passenger") {
        ccField.style.display = "block";
        weightField.style.display = "block";
        weightTaxTermSelect.value = "2"; 
    } else if (type === "cargo") {
        maxLoadField.style.display = "block";
        totalWeightField.style.display = "block";
        weightTaxTermSelect.value = "1"; 
    } else if (type === "special_camping") {
        ccField.style.display = "block";
        totalWeightField.style.display = "block"; 
        weightTaxTermSelect.value = "2"; 
    } else if (type === "special_other") {
        ccField.style.display = "block";           
        totalWeightField.style.display = "block"; 
        const currentTw = parseInt(document.getElementById("totalWeightInput").value) || 0;
        if (currentTw > 0) {
            weightTaxTermSelect.value = (currentTw < 3000) ? "2" : "1";
        } else {
            weightTaxTermSelect.value = "1"; 
        }
    }
    calculateTaxes();
});

document.getElementById("imageInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) {
        statusEl.innerText = "画像が選択されました。「画像を読み取る」を押してください。";
    }
});

submitBtn.addEventListener("click", async function() {
    if (!selectedFile) {
        alert("車検証の画像を選択してください。");
        return;
    }
    submitBtn.disabled = true;
    statusEl.innerText = "画像処理中...";
    
    const img = new Image();
    img.onload = async () => {
        try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                const bw = gray > 170 ? 255 : 0;
                data[i] = bw; data[i+1] = bw; data[i+2] = bw;
            }
            ctx.putImageData(imageData, 0, 0);
            
            statusEl.innerText = "OCR実行中...";
            const result = await Tesseract.recognize(canvas, "jpn+eng");
            parseData(result.data.text);
            
        } catch (err) {
            console.error(err);
            statusEl.innerText = "エラーが発生しました。";
        } finally {
            submitBtn.disabled = false;
        }
    };
    img.src = URL.createObjectURL(selectedFile);
});

function parseData(text) {
    const clean = text.replace(/[—ー－]/g, "-").replace(/\s+/g, " ").toUpperCase();
    let model = "";
    let weight = "";
    let totalWeight = "";
    let maxLoad = "";
    let ccValue = ""; 
    
    const modelMatch = clean.match(/([A-Z0-9]{3,4})\s*-\s*[A-Z0-9]+/);
    if (modelMatch) {
        model = modelMatch[0].replace(/\s+/g, "");
    } else {
        const shortMatch = clean.match(/\b(3BA|5BA|6AA|4AA|3DA|LDA|QDF|ZAA|ZAB|ZBA|ZLA)\b/);
        if (shortMatch) model = shortMatch[0];
    }
    
    const regMatch = clean.match(/(平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月/);
    if (regMatch) {
        const era = regMatch[1];
        const year = parseInt(regMatch[2]);
        const month = parseInt(regMatch[3]);
        let seirekiYear = (era === "平成") ? (1988 + year) : (2018 + year);

        let selectValue = seirekiYear.toString();
        if (seirekiYear === 2019) {
            selectValue = (month >= 10) ? "2019_10" : "2019_9";
        } else if (seirekiYear < 1989) {
            selectValue = "1989";
        }
        
        const yearSelect = document.getElementById("firstRegYearSelect");
        if (Array.from(yearSelect.options).some(opt => opt.value === selectValue)) {
            yearSelect.value = selectValue;
        }
    }
    
    const ccMatch = clean.match(/(\d+\.\d+)\s*L/);
    if (ccMatch) ccValue = parseFloat(ccMatch[1]);

    const nums = clean.match(/\d{3,5}/g) || [];
    let weightsFound = nums.map(n => parseInt(n)).filter(v => v >= 350 && v <= 15000);
    if (weightsFound.length > 0) {
        weightsFound.sort((a, b) => a - b);
        weight = weightsFound[0] || "";
        if (weightsFound.length >= 2) totalWeight = weightsFound[weightsFound.length - 1];
        if (weightsFound.length >= 3) maxLoad = weightsFound[1];
    }
    
    document.getElementById("modelInput").value = model;
    document.getElementById("ccInput").value = ccValue;
    document.getElementById("weightInput").value = weight;
    document.getElementById("maxLoadInput").value = maxLoad;
    document.getElementById("totalWeightInput").value = totalWeight;
    
    if (carTypeSelect.value === "special_other" && totalWeight > 0) {
        weightTaxTermSelect.value = (totalWeight < 3000) ? "2" : "1";
    }
    
    calculateTaxes();
    statusEl.innerText = "読み取り完了";
}

function calculateTaxes() {
    const type = carTypeSelect.value;
    const term = parseInt(weightTaxTermSelect.value) || 2;
    
    const modelRaw = document.getElementById("modelInput").value.toUpperCase();
    const cleanModel = modelRaw.replace(/[^A-Z0-9]/g, ""); 
    const modelHead = cleanModel.slice(0, 3);
    
    const regValue = document.getElementById("firstRegYearSelect").value;
    let regYear = 0;
    let isNewTax = false;
    
    if (regValue === "2019_10") {
        regYear = 2019; isNewTax = true;
    } else if (regValue === "2019_9") {
        regYear = 2019; isNewTax = false;
    } else {
        regYear = parseInt(regValue) || 2026;
        if (regYear >= 2020) isNewTax = true;
    }

    const currentYear = new Date().getFullYear();
    const passedYears = currentYear - regYear;
    
    let carTaxCategory = "normal";
    if (isNewTax) {
        carTaxCategory = "new";
    } else if (passedYears >= 18) {
        carTaxCategory = "over18";
    } else if (passedYears >= 13) {
        carTaxCategory = "over13";
    } else if (passedYears >= 11) {
        carTaxCategory = "over11";
    }

    const badgeEl = document.getElementById("taxCategoryBadge");
    if (carTaxCategory === "new") badgeEl.innerHTML = '<span style="color: #0066cc;">[新税率適用]</span>';
    else if (carTaxCategory === "over18") badgeEl.innerHTML = '<span style="color: #ff3333;">[18年経過 重課]</span>';
    else if (carTaxCategory === "over13") badgeEl.innerHTML = '<span style="color: #ff6600;">[13年経過 重課]</span>';
    else if (carTaxCategory === "over11") badgeEl.innerHTML = '<span style="color: #d4a017;">[11年経過 重課対象年]</span>';
    else badgeEl.innerHTML = '<span style="color: #28a745;">[標準（重課なし）]</span>';

    let weightTaxCategory = "standard"; 
    const isEV = evPrefixes.includes(modelHead);
    const isEco = ecoPrefixes.includes(modelHead);
    const isDiesel = dieselPrefixes.includes(modelHead);
    
    if (isEV) {
        weightTaxCategory = "ev";
        document.getElementById("badgeArea").innerHTML = '<span class="badge-ev">電気自動車 / PHEV判定</span>';
        if (["over11", "over13", "over18"].includes(carTaxCategory)) carTaxCategory = "normal";
    } else if (isEco) {
        weightTaxCategory = "eco";
        document.getElementById("badgeArea").innerHTML = '<span class="badge-eco">エコカー判定（重課免除）</span>';
        if (["over11", "over13", "over18"].includes(carTaxCategory)) carTaxCategory = "normal";
    } else if (isDiesel) {
        document.getElementById("badgeArea").innerHTML = '<span class="badge-diesel">ディーゼル車判定</span>';
        if (carTaxCategory === "over11") weightTaxCategory = "standard"; 
        else if (carTaxCategory === "over13") weightTaxCategory = "over13";
        else if (carTaxCategory === "over18") weightTaxCategory = "over18";
    } else {
        document.getElementById("badgeArea").innerHTML = '';
        if (carTaxCategory === "over11") carTaxCategory = "normal";
        else if (carTaxCategory === "over13") weightTaxCategory = "over13";
        else if (carTaxCategory === "over18") weightTaxCategory = "over18";
    }
    
    const categoryLabels = {
        "ev": "免税（電気自動車等）",
        "eco": "エコカー（本則税率）",
        "standard": "標準税率（13年未満）",
        "over13": "13年経過重課税率",
        "over18": "18年経過重課税率"
    };
    document.getElementById("weightTaxCategoryLabel").innerText = `［適用税率: ${categoryLabels[weightTaxCategory]}］`;
    
    weightTaxTermLabel.innerText = term;
    let weightTaxAmount = 0;
    currentYearlyTax = 0;

    const cc = parseFloat(document.getElementById("ccInput").value) || 0;
    const w = parseInt(document.getElementById("weightInput").value) || 0;
    const totalWeight = parseInt(document.getElementById("totalWeightInput").value) || 0;
    const maxLoad = parseInt(document.getElementById("maxLoadInput").value) || 0;

    if (type === "passenger") {
        weightTaxAmount = getWeightTaxPassenger(w, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlyPassenger(cc, carTaxCategory, isEV);
    } else if (type === "cargo") {
        weightTaxAmount = getWeightTaxCargo(totalWeight, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlyCargo(maxLoad, carTaxCategory);
    } else if (type === "special_camping") {
        weightTaxAmount = getWeightTaxCargo(totalWeight, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlyCamping(cc, carTaxCategory, isEV);
    } else if (type === "special_other") {
        weightTaxAmount = getWeightTaxCargo(totalWeight, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlySpecialOther(cc, carTaxCategory, isEV);
    }
    
    document.getElementById("weightTax").innerText = (weightTaxAmount === 0 && isEV) ? "0円" : (weightTaxAmount > 0 ? weightTaxAmount.toLocaleString() + "円" : "-");
    document.getElementById("carTaxYearly").innerText = currentYearlyTax > 0 ? currentYearlyTax.toLocaleString() + "円" : "-";
    
    updateMonthlyDisplay();
}

function updateMonthlyDisplay() {
    const selectedMonth = parseInt(document.getElementById("monthSelect").value);
    const monthlyTaxEl = document.getElementById("carTaxMonthly");
    
    if (currentYearlyTax > 0) {
        const monthlyAmount = getCarTaxMonthly(currentYearlyTax, selectedMonth);
        let text = `<b style="font-size: 20px; color: #0066cc;">${selectedMonth}月登録の月割り額: ${monthlyAmount.toLocaleString()}円</b>`;
        if (selectedMonth === 3) text = `<b style="font-size: 20px; color: #ff3333;">3月登録の月割り額: 0円</b> (当期分なし)`;
        monthlyTaxEl.innerHTML = text;
    } else {
        monthlyTaxEl.innerText = "条件を入力し計算を実行すると表示されます";
    }
}

function getWeightTaxPassenger(weight, category, term) {
    if (weight <= 0 || term <= 0) return 0;
    if (category === "ev") return 0;
    let pricePerUnitPerYear = 4100; 
    if (category === "eco") pricePerUnitPerYear = 2500;       
    if (category === "over13") pricePerUnitPerYear = 5700;    
    if (category === "over18") pricePerUnitPerYear = 6300;    
    return pricePerUnitPerYear * Math.ceil(weight / 500) * term;
}

function getWeightTaxCargo(totalWeight, category, term) {
    if (totalWeight <= 0 || term <= 0) return 0;
    if (category === "ev") return 0;
    let yearlyPrice = 0;
    
    if (category === "eco") {
        if (totalWeight <= 1000) yearlyPrice = 2500;
        else if (totalWeight <= 2000) yearlyPrice = 5000;
        else if (totalWeight <= 3000) yearlyPrice = 7500;
        else yearlyPrice = 7500 + (Math.ceil((totalWeight - 3000) / 1000) * 2500);
    } else if (category === "standard") {
        if (totalWeight <= 1000) yearlyPrice = 3300;
        else if (totalWeight <= 2000) yearlyPrice = 6600;
        else if (totalWeight <= 2500) yearlyPrice = 9900;
        else if (totalWeight <= 3000) yearlyPrice = 12300;
        else yearlyPrice = 12300 + (Math.ceil((totalWeight - 3000) / 1000) * 4100);
    } else if (category === "over13") {

    }
    return yearlyPrice * term;
}

function getCarTaxMonthly(yearlyAmount, month) {
    if (!yearlyAmount || !month) return 0;
    let remainingMonths = (month >= 4) ? (15 - month) : (3 - month);
    if (remainingMonths <= 0) return 0;
    return Math.floor(((yearlyAmount * remainingMonths) / 12) / 100) * 100;
}
