<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>車検証税額チェッカー β (重課税・月割り修正版)</title>
    <!-- Tesseract.js（OCRライブラリ）の読み込み -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #f5f5f5; }
        h1 {font-size: 28px; }
        .card {background: white; border-radius: 12px; padding: 16px; margin-top: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        input[type="file"], select {width: 100%; margin-top: 12px; box-sizing: border-box; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        
        /* 手動修正用の入力欄のスタイル */
        .input-inline {width: 120px; padding: 8px; margin: 4px 8px 4px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;}
        .text-right { text-align: right; }
        .text-left { text-align: left; }
        
        /* 実行ボタンのスタイル */
        .btn-submit {width: 100%; margin-top: 16px; padding: 14px; font-size: 18px; font-weight: bold; color: white; background-color: #0066cc; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.2); transition: background 0.2s; }
        .btn-submit:hover {background-color: #0052a3; }
        .btn-submit:disabled {background-color: #cccccc; cursor: not-allowed; box-shadow: none; }
        
        /* 再計算ボタンのスタイル */
        .btn-recalc {background-color: #28a745; margin-top: 12px;}
        .btn-recalc:hover {background-color: #218838; }

        .result {font-size: 18px; line-height: 2; }
        .status {font-weight: bold; color: #333; }
        .monthly-box {background: #f0f7ff; border-left: 4px solid #0066cc; padding: 12px; margin-top: 12px; font-size: 16px; border-radius: 0 8px 8px 0; line-height: 1.6; }
        .select-container {margin-top: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>車検証税額チェッカー β</h1>
    <p>画像は端末内のみで処理されます（サーバー非送信）。</p>

    <!-- 設定カード -->
    <div class="card">
        <label style="font-weight: bold;">1. 車検証画像を選択：</label>
        <input type="file" id="imageInput" accept="image/*">
        <div class="select-container" style="margin-top: 16px;">
            <label style="font-weight: bold;" for="monthSelect">2. 新規登録する月を指定：</label>
            <select id="monthSelect">
                <option value="4">4月登録 (5月〜翌3月の11ヶ月分)</option>
                <option value="5">5月登録 (6月〜翌3月の10ヶ月分)</option>
                <option value="6">6月登録 (7月〜翌3月の9ヶ月分)</option>
                <option value="7">7月登録 (8月〜翌3月の8ヶ月分)</option>
                <option value="8">8月登録 (9月〜翌3月の7ヶ月分)</option>
                <option value="9">9月登録 (10月〜翌3月の6ヶ月分)</option>
                <option value="10">10月登録 (11月〜翌3月の5ヶ月分)</option>
                <option value="11">11月登録 (12月〜翌3月の4ヶ月分)</option>
                <option value="12">12月登録 (1月〜翌3月の3ヶ月分)</option>
                <option value="1">1月登録 (2月〜翌3月の2ヶ月分)</option>
                <option value="2">2月登録 (3月の1ヶ月分)</option>
                <option value="3">3月登録 (当期分なし・0円)</option>
            </select>
        </div>
        <button type="button" id="submitBtn" class="btn-submit">画像を読み取る</button>
    </div>

    <div class="card">
        <div id="status" class="status">画像を選択して「画像を読み取る」を押してください</div>
    </div>

    <!-- 抽出された結果と税額を表示 -->
    <div class="card result">
        <h2>抽出結果と修正</h2>
        <small style="color: #666; display: block; margin-bottom: 12px; line-height: 1.4;">
            ※読み取りが間違っている・空欄の場合は、各項目を直接書き換えて「修正して再計算」を押してください。
        </small>

        <label for="modelInput">型式：</label> 
        <input type="text" id="modelInput" class="input-inline text-left" style="width: 180px;" placeholder="例: 3BA-NBOX"> <br>

        <label for="taxRateSelect">税率・重課区分：</label> 
        <select id="taxRateSelect" class="input-inline text-left" style="width: 300px; display: inline-block; margin-top: 0;">
            <option value="new">2019年(令和元年)10月以降 [新税率・重課なし]</option>
            <option value="normal">2013年〜2019年9月 [旧税率・重課なし]</option>
            <option value="over13">2008年〜2012年 [13年経過・自動車税&重量税重課]</option>
            <option value="over18">2007年(平成19年)以前 [18年経過・自動車税&重量税さらに重課]</option>
        </select>
        <span id="firstRegDisplay" style="font-size: 14px; color: #888; margin-left: 4px;"></span> <br>
        
        <label for="ccInput">総排気量：</label> 
        <input type="number" step="0.01" id="ccInput" class="input-inline text-right" placeholder="例: 1.49"> L <br>
        
        <label for="weightInput">車両重量：</label> 
        <input type="number" id="weightInput" class="input-inline text-right" placeholder="例: 1250"> kg <br>

        <button type="button" id="recalcBtn" class="btn-submit btn-recalc">修正して再計算</button>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <strong>重量税(2年)： <span id="weightTax">-</span></strong><br>
        <strong>自動車税（種別割）年額： <span id="carTaxYearly">-</span></strong>
        
        <!-- 月割り金額の表示エリア -->
        <div class="monthly-box">
            <strong>自動車税（種別割）月割り計算結果：</strong><br>
            <span id="carTaxMonthly">排気量を入力し計算を実行すると表示されます</span><br>
            <small style="color: #666;">※普通車は登録月の翌月から3月までの残り月数で計算します（100円未満切り捨て）。</small>
        </div>
    </div>

<script>
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const recalcBtn = document.getElementById("recalcBtn");

let currentYearlyTax = 0; // 自動車税の年額
let selectedFile = null;  // 選択ファイル

// 画像選択
document.getElementById("imageInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) {
        statusEl.innerText = "画像が選択されました。「画像を読み取る」を押してください。";
    }
});

// OCR実行
submitBtn.addEventListener("click", async function() {
    if (!selectedFile) {
        alert("車検証の画像を選択してください。");
        return;
    }
    submitBtn.disabled = true;
    statusEl.innerText = "画像処理中...";
    
    const img = new Image();
    img.onload = async () => {
        try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            // 白黒化（二二値化）処理
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                const bw = gray > 170 ? 255 : 0;
                data[i] = bw; data[i+1] = bw; data[i+2] = bw;
            }
            ctx.putImageData(imageData, 0, 0);
            
            statusEl.innerText = "OCR実行中（文字を解析しています）...";
            
            const result = await Tesseract.recognize(canvas, "jpn+eng");
            parseData(result.data.text);
            
        } catch (err) {
            console.error(err);
            statusEl.innerText = "エラーが発生しました。別の画像で試してください。";
        } finally {
            submitBtn.disabled = false;
        }
    };
    img.src = URL.createObjectURL(selectedFile);
});

// 再計算ボタンのイベント
recalcBtn.addEventListener("click", function() {
    calculateTaxes();
    statusEl.innerText = "手動修正された値で再計算しました。";
});

// 月が変更された際のリアルタイム更新
document.getElementById("monthSelect").addEventListener("change", function() {
    updateMonthlyDisplay();
});

// OCRのテキストを解析してフォームにセットする
function parseData(text) {
    const clean = text.replace(/[—ー－]/g, "-").replace(/\s+/g, " ").toUpperCase();
        
    let model = "";
    let firstReg = "";
    let weight = "";
    let ccValue = ""; 
    let detectedCategory = "new"; // デフォルトは新税率区分
    
    // 型式
    const modelMatch = clean.match(/(DBA|CBA|EBA|3BA|5BA)\s*-\s*[A-Z0-9]+/);
    if (modelMatch) model = modelMatch[0].replace(/\s+/g, "");
    
    // 初度登録（重課税・新旧税率判定のために西暦へ換算）
    const regMatch = clean.match(/(平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月/);
    if (regMatch) {
        firstReg = regMatch[0].replace(/\s+/g, "");
        const era = regMatch[1];
        const year = parseInt(regMatch[2]);
        const month = parseInt(regMatch[3]);
        
        let seirekiYear = 0;
        if (era === "平成") {
            seirekiYear = 1988 + year;
        } else if (era === "令和") {
            seirekiYear = 2018 + year;
        }

        // 2026年現在の基準で重課・税率を4段階に自動ジャッジ
        if (seirekiYear >= 2020 || (seirekiYear === 2019 && month >= 10)) {
            detectedCategory = "new";
        } else if (seirekiYear >= 2013) {
            detectedCategory = "normal";
        } else if (seirekiYear >= 2008) {
            detectedCategory = "over13";
        } else {
            detectedCategory = "over18";
        }
    }
    
    // 総排気量 (小数点付きの数字+L を探す)
    const ccMatch = clean.match(/(\d+\.\d+)\s*L/);
    if (ccMatch) ccValue = parseFloat(ccMatch[1]);

    // 車両重量 (700~3000の4桁を探す)
    let tempWeight = 0;
    const nums = clean.match(/\d{4}/g) || [];
    nums.forEach(n => {
        const v = parseInt(n);
        if (v >= 700 && v <= 3000 && v > tempWeight) { tempWeight = v; }
    });
    if (tempWeight > 0) weight = tempWeight;
    
    // 画面の各入力欄に値をセット
    document.getElementById("modelInput").value = model;
    document.getElementById("taxRateSelect").value = detectedCategory;
    document.getElementById("firstRegDisplay").innerText = firstReg ? `(解読: ${firstReg})` : "(解読不可)";
    document.getElementById("ccInput").value = ccValue;
    document.getElementById("weightInput").value = weight;
    
    // 計算実行
    calculateTaxes();
    statusEl.innerText = "読み取り完了（間違っている部分は修正してください）";
}

// フォームの数値から税金を計算して表示する
function calculateTaxes() {
    const ccInputVal = document.getElementById("ccInput").value;
    const weightInputVal = document.getElementById("weightInput").value;
    const taxRateSelectVal = document.getElementById("taxRateSelect").value;
    
    const cc = parseFloat(ccInputVal) || 0;
    const w = parseInt(weightInputVal) || 0;

    // 分類に応じた重量税と自動車税を算出
    const weightTaxAmount = getWeightTax(w, taxRateSelectVal);
    currentYearlyTax = getCarTaxYearly(cc, taxRateSelectVal);
    
    document.getElementById("weightTax").innerText = weightTaxAmount > 0 ? weightTaxAmount.toLocaleString() + "円" : "-";
    document.getElementById("carTaxYearly").innerText = currentYearlyTax > 0 ? currentYearlyTax.toLocaleString() + "円" : "-";
    
    updateMonthlyDisplay();
}

// 月割り表示の更新（バグ修正版）
function updateMonthlyDisplay() {
    const selectEl = document.getElementById("monthSelect");
    const selectedMonth = parseInt(selectEl.value);
    const monthlyTaxEl = document.getElementById("carTaxMonthly");
    
    if (currentYearlyTax > 0) {
        const monthlyAmount = getCarTaxMonthly(currentYearlyTax, selectedMonth);
        let text = `<b style="font-size: 20px; color: #0066cc;">${selectedMonth}月登録の月割り額: ${monthlyAmount.toLocaleString()}円</b>`;
        if (selectedMonth === 3) {
            text = `<b style="font-size: 20px; color: #ff3333;">3月登録の月割り額: 0円</b> (当期分なし)`;
        }
        monthlyTaxEl.innerHTML = text;
    } else {
        monthlyTaxEl.innerText = "排気量を入力し計算を実行すると表示されます";
    }
}

// 重量税テーブル（重課対応版）
function getWeightTax(weight, category) {
    if (weight <= 0) return 0;
    
    let basePricePerUnit = 8200; // 通常料金 (0.5トンあたり)
    if (category === "over13") basePricePerUnit = 11400; // 13年経過重課
    if (category === "over18") basePricePerUnit = 12600; // 18年経過重課
    
    const units = Math.ceil(weight / 500); // 0.5トンずつの区分数を算出
    return basePricePerUnit * units;
}

// 自動車税（種別割）年額テーブル（重課対応版）
function getCarTaxYearly(cc, category) {
    if (cc <= 0) return 0;
    
    if (category === "new") {
        // 令和元年10月1日以降に初回新規登録
        if (cc <= 1.0) return 25000; if (cc <= 1.5) return 30500;
        if (cc <= 2.0) return 36000; if (cc <= 2.5) return 43500;
        if (cc <= 3.0) return 50000; if (cc <= 3.5) return 57000;
        if (cc <= 4.0) return 65500; if (cc <= 4.5) return 75500;
        if (cc <= 6.0) return 87000; return 101000;
    } else if (category === "normal") {
        // 令和元年9月30日以前（重課なし）
        if (cc <= 1.0) return 29500; if (cc <= 1.5) return 34500;
        if (cc <= 2.0) return 39500; if (cc <= 2.5) return 45000;
        if (cc <= 3.0) return 51000; if (cc <= 3.5) return 58000;
        if (cc <= 4.0) return 66500; if (cc <= 4.5) return 76500;
        if (cc <= 6.0) return 88000; return 111000;
    } else {
        // 13年・18年経過 ガソリン乗用車（概ね15%重課・100円未満切り捨て）
        if (cc <= 1.0) return 33900; if (cc <= 1.5) return 39600;
        if (cc <= 2.0) return 45400; if (cc <= 2.5) return 51700;
        if (cc <= 3.0) return 58600; if (cc <= 3.5) return 66700;
        if (cc <= 4.0) return 76400; if (cc <= 4.5) return 87900;
        if (cc <= 6.0) return 101200; return 127600;
    }
}

// 月割り計算（バグを修正：4月始まりの会計サイクルに準拠）
function getCarTaxMonthly(yearlyAmount, month) {
    if (!yearlyAmount || !month) return 0;
    
    let remainingMonths = 0;
    if (month >= 4) {
        remainingMonths = 15 - month;  // 例: 6月なら 15 - 6 = 9ヶ月分
    } else {
        remainingMonths = 3 - month;   // 例: 1月なら 3 - 1 = 2ヶ月分
    }
    
    if (remainingMonths <= 0) return 0;
    const monthlyValue = (yearlyAmount * remainingMonths) / 12;
    return Math.floor(monthlyValue / 100) * 100; // 100円未満切り捨て
}
</script>
</body>
</html>
