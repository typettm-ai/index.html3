<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>車検証税額チェッカー β (型式自動判別版)</title>
    <!-- Tesseract.js（OCRライブラリ）の読み込み -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #f5f5f5; }
        h1 {font-size: 28px; }
        .card {background: white; border-radius: 12px; padding: 16px; margin-top: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        input[type="file"], select {width: 100%; margin-top: 12px; box-sizing: border-box; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        
        /* 手動修正用の入力欄のスタイル */
        .input-inline {width: 120px; padding: 8px; margin: 4px 8px 4px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;}
        .text-right { text-align: right; }
        .text-left { text-align: left; }
        
        /* 実行ボタンのスタイル */
        .btn-submit {width: 100%; margin-top: 16px; padding: 14px; font-size: 18px; font-weight: bold; color: white; background-color: #0066cc; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.2); transition: background 0.2s; }
        .btn-submit:hover {background-color: #0052a3; }
        .btn-submit:disabled {background-color: #cccccc; cursor: not-allowed; box-shadow: none; }
        
        /* 再計算ボタンのスタイル */
        .btn-recalc {background-color: #28a745; margin-top: 12px;}
        .btn-recalc:hover {background-color: #218838; }

        .result {font-size: 18px; line-height: 2; }
        .status {font-weight: bold; color: #333; }
        .monthly-box {background: #f0f7ff; border-left: 4px solid #0066cc; padding: 12px; margin-top: 12px; font-size: 16px; border-radius: 0 8px 8px 0; line-height: 1.6; }
        .select-container {margin-top: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>車検証税額チェッカー β</h1>
    <p>画像は端末内のみで処理されます（サーバー非送信）。</p>

    <!-- 設定カード -->
    <div class="card">
        <div class="select-container">
            <label style="font-weight: bold;" for="carTypeSelect">1. 車種区分を選択：</label>
            <select id="carTypeSelect">
                <option value="passenger">乗用車 (3 / 5ナンバー等)</option>
                <option value="cargo">貨物車・トラック (1 / 4ナンバー等)</option>
            </select>
        </div>

        <label style="font-weight: bold; display: block; margin-top: 16px;">2. 車検証画像を選択：</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <div class="select-container" style="margin-top: 16px;">
            <label style="font-weight: bold;" for="monthSelect">3. 新規登録する月を指定：</label>
            <select id="monthSelect">
                <option value="4">4月登録 (5月〜翌3月の11ヶ月分)</option>
                <option value="5">5月登録 (6月〜翌3月の10ヶ月分)</option>
                <option value="6">6月登録 (7月〜翌3月の9ヶ月分)</option>
                <option value="7">7月登録 (8月〜翌3月の8ヶ月分)</option>
                <option value="8">8月登録 (9月〜翌3月の7ヶ月分)</option>
                <option value="9">9月登録 (10月〜翌3月の6ヶ月分)</option>
                <option value="10">10月登録 (11月〜翌3月の5ヶ月分)</option>
                <option value="11">11月登録 (12月〜翌3月の4ヶ月分)</option>
                <option value="12">12月登録 (1月〜翌3月の3ヶ月分)</option>
                <option value="1">1月登録 (2月〜翌3月の2ヶ月分)</option>
                <option value="2">2月登録 (3月の1ヶ月分)</option>
                <option value="3">3月登録 (当期分なし・0円)</option>
            </select>
        </div>
        <button type="button" id="submitBtn" class="btn-submit">画像を読み取る</button>
    </div>

    <div class="card">
        <div id="status" class="status">画像を選択して「画像を読み取る」を押してください</div>
    </div>

    <!-- 抽出された結果と税額を表示 -->
    <div class="card result">
        <h2>抽出結果と修正</h2>
        <small style="color: #666; display: block; margin-bottom: 12px; line-height: 1.4;">
            ※読み取りが間違っている・空欄の場合は、各項目を直接書き換えて「修正して再計算」を押してください。
        </small>

        <label for="modelInput">型式（または頭の記号）：</label> 
        <input type="text" id="modelInput" class="input-inline text-left" style="width: 200px;" placeholder="例: 3BA (空欄可)"> <br>

        <label for="taxRateSelect">初度登録年(自動車税区分)：</label> 
        <select id="taxRateSelect" class="input-inline text-left" style="width: 320px; display: inline-block; margin-top: 0;">
            <option value="new">令和元年10月 以降 ［新税率］</option>
            <option value="normal">平成25年 〜 令和元年9月 ［旧税率］</option>
            <option value="over13">平成20年 〜 平成24年 ［13年経過重課］</option>
            <option value="over18">平成19年 以前 ［18年経過さらに重課］</option>
        </select>
        <span id="firstRegDisplay" style="font-size: 14px; color: #888; margin-left: 4px;"></span> <br>

        <!-- 重量税専用区分 -->
        <label for="weightTaxCategorySelect">重量税の区分(エコカー・重課)：</label> 
        <select id="weightTaxCategorySelect" class="input-inline text-left" style="width: 320px; display: inline-block; margin-top: 0;">
            <option value="eco">エコカー ［本則税率］</option>
            <option value="standard" selected>非エコカー ［13年未満標準］</option>
            <option value="over13">13年経過重課 ［旧税率より増税］</option>
            <option value="over18">18年経過重課 ［さらに増税］</option>
        </select> <br>

        <!-- 支払年数 -->
        <label for="weightTaxTermSelect">重量税の支払年数：</label> 
        <select id="weightTaxTermSelect" class="input-inline text-left" style="width: 200px; display: inline-block; margin-top: 0;">
            <option value="1">1年分 (トラック継続など)</option>
            <option value="2" selected>2年分 (通常の継続車検など)</option>
            <option value="3">3年分 (乗用車の新車登録など)</option>
        </select> <br>
        
        <!-- 乗用車用に入力欄 -->
        <div id="passengerInputFields">
            <label for="ccInput">総排気量：</label> 
            <input type="number" step="0.01" id="ccInput" class="input-inline text-right" placeholder="例: 1.49"> L <br>
            
            <label for="weightInput">車両重量：</label> 
            <input type="number" id="weightInput" class="input-inline text-right" placeholder="例: 1250"> kg <br>
        </div>

        <!-- 貨物車用に入力欄 -->
        <div id="cargoInputFields" style="display: none;">
            <label for="maxLoadInput">最大積載量：</label> 
            <input type="number" id="maxLoadInput" class="input-inline text-right" placeholder="例: 2000"> kg <br>
            
            <label for="totalWeightInput">車両総重量：</label> 
            <input type="number" id="totalWeightInput" class="input-inline text-right" placeholder="例: 4450"> kg <br>
        </div>

        <button type="button" id="recalcBtn" class="btn-submit btn-recalc">修正して再計算</button>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <strong>重量税(<span id="weightTaxTermLabel">2</span>年分)： <span id="weightTax">-</span></strong><br>
        <strong>自動車税（種別割）年額： <span id="carTaxYearly">-</span></strong>
        
        <!-- 月割り金額の表示エリア -->
        <div class="monthly-box">
            <strong>自動車税（種別割）月割り計算結果：</strong><br>
            <span id="carTaxMonthly">条件を入力し計算を実行すると表示されます</span><br>
            <small style="color: #666;" id="monthlyNotice">※普通車は登録月の翌月から3月までの残り月数で計算します（100円未満切り捨て）。</small>
        </div>
    </div>

<script>
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const recalcBtn = document.getElementById("recalcBtn");
const carTypeSelect = document.getElementById("carTypeSelect");

const passengerInputFields = document.getElementById("passengerInputFields");
const cargoInputFields = document.getElementById("cargoInputFields");
const weightTaxTermSelect = document.getElementById("weightTaxTermSelect");
const weightTaxTermLabel = document.getElementById("weightTaxTermLabel");
const monthlyNotice = document.getElementById("monthlyNotice");

let currentYearlyTax = 0; 
let selectedFile = null;  

// 車種切り替え時のUI制御
carTypeSelect.addEventListener("change", function() {
    if (this.value === "passenger") {
        passengerInputFields.style.display = "block";
        cargoInputFields.style.display = "none";
        weightTaxTermSelect.value = "2"; 
        monthlyNotice.innerText = "※普通車は登録月の翌月から3月までの残り月数で計算します（100円未満切り捨て）。";
    } else {
        passengerInputFields.style.display = "none";
        cargoInputFields.style.display = "block";
        weightTaxTermSelect.value = "1"; 
        monthlyNotice.innerText = "※貨物車も乗用車と同様、登録月の翌月から3月までの残り月数で計算します（100円未満切り捨て）。";
    }
    calculateTaxes();
});

weightTaxTermSelect.addEventListener("change", function() {
    calculateTaxes();
});

document.getElementById("imageInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) {
        statusEl.innerText = "画像が選択されました。「画像を読み取る」を押してください。";
    }
});

submitBtn.addEventListener("click", async function() {
    if (!selectedFile) {
        alert("車検証の画像を選択してください。");
        return;
    }
    submitBtn.disabled = true;
    statusEl.innerText = "画像処理中...";
    
    const img = new Image();
    img.onload = async () => {
        try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            // 白黒化処理
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                const bw = gray > 170 ? 255 : 0;
                data[i] = bw; data[i+1] = bw; data[i+2] = bw;
            }
            ctx.putImageData(imageData, 0, 0);
            
            statusEl.innerText = "OCR実行中（文字を解析しています）...";
            
            const result = await Tesseract.recognize(canvas, "jpn+eng");
            parseData(result.data.text);
            
        } catch (err) {
            console.error(err);
            statusEl.innerText = "エラーが発生しました。別の画像で試してください。";
        } finally {
            submitBtn.disabled = false;
        }
    };
    img.src = URL.createObjectURL(selectedFile);
});

recalcBtn.addEventListener("click", function() {
    calculateTaxes();
    statusEl.innerText = "手動修正された値で再計算しました。";
});

document.getElementById("monthSelect").addEventListener("change", function() {
    updateMonthlyDisplay();
});

// OCRのテキストを解析してフォームにセットする
function parseData(text) {
    const clean = text.replace(/[—ー－]/g, "-").replace(/\s+/g, " ").toUpperCase();
        
    let model = "";
    let firstReg = "";
    let weight = "";
    let totalWeight = "";
    let maxLoad = "";
    let ccValue = ""; 
    let detectedCategory = "new"; 
    
    // 型式抽出
    const modelMatch = clean.match(/([A-Z0-9]{3,4})\s*-\s*[A-Z0-9]+/);
    if (modelMatch) {
        model = modelMatch[0].replace(/\s+/g, "");
    } else {
        const shortMatch = clean.match(/\b(3BA|5BA|6AA|4AA|DBA|CBA|ZAA)\b/);
        if (shortMatch) model = shortMatch[0];
    }
    
    // 初度登録
    const regMatch = clean.match(/(平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月/);
    if (regMatch) {
        firstReg = regMatch[0].replace(/\s+/g, "");
        const era = regMatch[1];
        const year = parseInt(regMatch[2]);
        const month = parseInt(regMatch[3]);
        
        let seirekiYear = 0;
        if (era === "平成") {
            seirekiYear = 1988 + year;
        } else if (era === "令和") {
            seirekiYear = 2018 + year;
        }

        if (seirekiYear >= 2020 || (seirekiYear === 2019 && month >= 10)) {
            detectedCategory = "new";
        } else if (seirekiYear >= 2013) {
            detectedCategory = "normal";
        } else if (seirekiYear >= 2008) {
            detectedCategory = "over13";
        } else {
            detectedCategory = "over18";
        }
    }
    
    // 総排気量
    const ccMatch = clean.match(/(\d+\.\d+)\s*L/);
    if (ccMatch) ccValue = parseFloat(ccMatch[1]);

    // 重量・積載量関連の数値
    const nums = clean.match(/\d{3,5}/g) || [];
    let weightsFound = nums.map(n => parseInt(n)).filter(v => v >= 350 && v <= 15000);
    
    if (weightsFound.length > 0) {
        weightsFound.sort((a, b) => a - b);
        weight = weightsFound[0] || "";
        if (weightsFound.length >= 2) totalWeight = weightsFound[weightsFound.length - 1];
        if (weightsFound.length >= 3) maxLoad = weightsFound[1];
    }
    
    // 画面の各入力欄に値をセット
    document.getElementById("modelInput").value = model;
    document.getElementById("taxRateSelect").value = detectedCategory;
    
    // ーーー ★【追加】型式の頭3桁によるエコカーの自動判別ロジック ーーー
    const modelHead = model.slice(0, 3);
    // エコカー（ハイブリッド、EV、一部クリーンディーゼルなど）を指す代表的な識別記号群
    const ecoPrefixes = ["6AA", "4AA", "5AA", "3AA", "DAA", "CAA", "ZAA"];
    
    if (ecoPrefixes.includes(modelHead)) {
        // エコカー記号にヒットした場合は「エコカー」を自動選択
        document.getElementById("weightTaxCategorySelect").value = "eco";
    } else if (detectedCategory === "over13" || detectedCategory === "over18") {
        document.getElementById("weightTaxCategorySelect").value = detectedCategory;
    } else {
        document.getElementById("weightTaxCategorySelect").value = "standard";
    }
    // ーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーーー

    document.getElementById("firstRegDisplay").innerText = firstReg ? `(解読: ${firstReg})` : "(解読不可)";
    document.getElementById("ccInput").value = ccValue;
    document.getElementById("weightInput").value = weight;
    document.getElementById("maxLoadInput").value = maxLoad;
    document.getElementById("totalWeightInput").value = totalWeight;
    
    calculateTaxes();
    statusEl.innerText = "読み取り完了（間違っている部分は修正してください）";
}

// フォームの数値から税金を計算して表示する
function calculateTaxes() {
    const isCargo = (carTypeSelect.value === "cargo");
    const carTaxCategory = document.getElementById("taxRateSelect").value;
    const weightTaxCategory = document.getElementById("weightTaxCategorySelect").value;
    const term = parseInt(weightTaxTermSelect.value) || 2;
    
    weightTaxTermLabel.innerText = term;

    let weightTaxAmount = 0;
    currentYearlyTax = 0;

    if (!isCargo) {
        const cc = parseFloat(document.getElementById("ccInput").value) || 0;
        const w = parseInt(document.getElementById("weightInput").value) || 0;
        
        weightTaxAmount = getWeightTaxPassenger(w, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlyPassenger(cc, carTaxCategory);
    } else {
        const maxLoad = parseInt(document.getElementById("maxLoadInput").value) || 0;
        const totalWeight = parseInt(document.getElementById("totalWeightInput").value) || 0;
        
        weightTaxAmount = getWeightTaxCargo(totalWeight, weightTaxCategory, term);
        currentYearlyTax = getCarTaxYearlyCargo(maxLoad, carTaxCategory);
    }
    
    document.getElementById("weightTax").innerText = weightTaxAmount > 0 ? weightTaxAmount.toLocaleString() + "円" : "-";
    document.getElementById("carTaxYearly").innerText = currentYearlyTax > 0 ? currentYearlyTax.toLocaleString() + "円" : "-";
    
    updateMonthlyDisplay();
}

function updateMonthlyDisplay() {
    const selectEl = document.getElementById("monthSelect");
    const selectedMonth = parseInt(selectEl.value);
    const monthlyTaxEl = document.getElementById("carTaxMonthly");
    
    if (currentYearlyTax > 0) {
        const monthlyAmount = getCarTaxMonthly(currentYearlyTax, selectedMonth);
        let text = `<b style="font-size: 20px; color: #0066cc;">${selectedMonth}月登録の月割り額: ${monthlyAmount.toLocaleString()}円</b>`;
        if (selectedMonth === 3) {
            text = `<b style="font-size: 20px; color: #ff3333;">3月登録の月割り額: 0円</b> (当期分なし)`;
        }
        monthlyTaxEl.innerHTML = text;
    } else {
        monthlyTaxEl.innerText = "条件を入力し計算を実行すると表示されます";
    }
}

// 重量税：乗用車
function getWeightTaxPassenger(weight, category, term) {
    if (weight <= 0 || term <= 0) return 0;
    let pricePerUnitPerYear = 4100; 
    if (category === "eco") pricePerUnitPerYear = 2500;       
    if (category === "over13") pricePerUnitPerYear = 5700;    
    if (category === "over18") pricePerUnitPerYear = 6300;    
    const units = Math.ceil(weight / 500); 
    return pricePerUnitPerYear * units * term;
}

// 重量税：貨物車
function getWeightTaxCargo(totalWeight, category, term) {
    if (totalWeight <= 0 || term <= 0) return 0;
    let pricePerTonPerYear = 4100; 
    if (category === "eco") pricePerTonPerYear = 2500;       
    if (category === "over13") pricePerTonPerYear = 5400;    
    if (category === "over18") pricePerTonPerYear = 5700;    
    const units = Math.ceil(totalWeight / 1000); 
    return pricePerTonPerYear * units * term;
}

// 自動車税：乗用車
function getCarTaxYearlyPassenger(cc, category) {
    if (cc <= 0) return 0;
    if (category === "new") {
        if (cc <= 1.0) return 25000; if (cc <= 1.5) return 30500;
        if (cc <= 2.0) return 36000; if (cc <= 2.5) return 43500;
        if (cc <= 3.0) return 50000; if (cc <= 3.5) return 57000;
        if (cc <= 4.0) return 65500; if (cc <= 4.5) return 75500;
        if (cc <= 6.0) return 87000; return 101000;
    } else if (category === "normal") {
        if (cc <= 1.0) return 29500; if (cc <= 1.5) return 34500;
        if (cc <= 2.0) return 39500; if (cc <= 2.5) return 45000;
        if (cc <= 3.0) return 51000; if (cc <= 3.5) return 58000;
        if (cc <= 4.0) return 66500; if (cc <= 4.5) return 76500;
        if (cc <= 6.0) return 88000; return 111000;
    } else {
        if (cc <= 1.0) return 33900; if (cc <= 1.5) return 39600;
        if (cc <= 2.0) return 45400; if (cc <= 2.5) return 51700;
        if (cc <= 3.0) return 58600; if (cc <= 3.5) return 66700;
        if (cc <= 4.0) return 76400; if (cc <= 4.5) return 87900;
        if (cc <= 6.0) return 101200; return 127600;
    }
}

// 自動車税：貨物車
function getCarTaxYearlyCargo(maxLoad, category) {
    if (maxLoad <= 0) return 0;
    let baseTax = 0;
    if (maxLoad <= 1000) baseTax = 8000;
    else if (maxLoad <= 2000) baseTax = 11500;
    else if (maxLoad <= 3000) baseTax = 16000;
    else if (maxLoad <= 4000) baseTax = 20500;
    else if (maxLoad <= 5000) baseTax = 25500;
    else if (maxLoad <= 6000) baseTax = 30000;
    else if (maxLoad <= 7000) baseTax = 35000;
    else if (maxLoad <= 8000) baseTax = 40500;
    else {
        const extraTons = Math.ceil((maxLoad - 8000) / 1000);
        baseTax = 40500 + (extraTons * 5500);
    }
    if (category === "over13" || category === "over18") {
        return Math.floor((baseTax * 1.1) / 100) * 100;
    }
    return baseTax;
}

// 月割り計算
function getCarTaxMonthly(yearlyAmount, month) {
    if (!yearlyAmount || !month) return 0;
    let remainingMonths = (month >= 4) ? (15 - month) : (3 - month);
    if (remainingMonths <= 0) return 0;
    return Math.floor(((yearlyAmount * remainingMonths) / 12) / 100) * 100;
}
</script>
</body>
</html>
