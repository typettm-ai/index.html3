<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>車検証税額チェッカー β</title>
    <!-- Tesseract.js（OCRライブラリ）の読み込み -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 700px; margin: auto; padding: 20px; background: #f5f5f5; }
        h1 {font-size: 28px; }
        .card {background: white; border-radius: 12px; padding: 16px; margin-top: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
        input, select {width: 100%; margin-top: 12px; box-sizing: border-box; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        /* 実行ボタンのスタイル */
        .btn-submit {width: 100%; margin-top: 16px; padding: 14px; font-size: 18px; font-weight: bold; color: white; background-color: #0066cc; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.2); transition: background 0.2s; }
        .btn-submit:hover {background-color: #0052a3; }
        .btn-submit:disabled {background-color: #cccccc; cursor: not-allowed; box-shadow: none; }
        .result {font-size: 18px; line-height: 2; }
        .status {font-weight: bold; color: #333; }
        .monthly-box {background: #f0f7ff; border-left: 4px solid #0066cc; padding: 12px; margin-top: 12px; font-size: 16px; border-radius: 0 8px 8px 0; line-height: 1.6; }
        .select-container {margin-top: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>車検証税額チェッカー β</h1>
    <p>
        画像は端末内のみで処理されます。<br>
        サーバーへ送信しません。
    </p>

    <!-- 設定カード -->
    <div class="card">
        <label style="font-weight: bold;">1. 車検証画像を選択：</label>
        <input type="file" id="imageInput" accept="image/*">
        <div class="select-container" style="margin-top: 16px;">
            <label style="font-weight: bold;" for="monthSelect">2. 新規登録する月を指定：</label>
            <select id="monthSelect">
                <option value="4">4月登録 (5月〜翌3月の11ヶ月分)</option>
                <option value="5">5月登録 (6月〜翌3月の10ヶ月分)</option>
                <option value="6">6月登録 (7月〜翌3月の9ヶ月分)</option>
                <option value="7">7月登録 (8月〜翌3月の8ヶ月分)</option>
                <option value="8">8月登録 (9月〜翌3月の7ヶ月分)</option>
                <option value="9">9月登録 (10月〜翌3月の6ヶ月分)</option>
                <option value="10">10月登録 (11月〜翌3月の5ヶ月分)</option>
                <option value="11">11月登録 (12月〜翌3月の4ヶ月分)</option>
                <option value="12">12月登録 (1月〜翌3月の3ヶ月分)</option>
                <option value="1">1月登録 (2月〜翌3月の2ヶ月分)</option>
                <option value="2">2月登録 (3月の1ヶ月分)</option>
                <option value="3">3月登録 (当期分なし・0円)</option>
            </select>
        </div>
        <button type="button" id="submitBtn" class="btn-submit">税額を計算する</button>
    </div>

    <div class="card">
        <div id="status" class="status">画像を選択して「税額を計算する」を押してください</div>
    </div>

    <!-- 抽出された結果と税額を表示 -->
    <div class="card result">
        <h2>抽出結果</h2>
        型式： <span id="model">-</span> <br>
        初度登録： <span id="firstReg">-</span> <br>
        総排気量又は定格出力： <span id="cc">-</span> <br>
        車両重量： <span id="weight">-</span> <br><br>
        
        <strong>重量税： <span id="weightTax">-</span></strong><br>
        <strong>自動車税（種別割）年額： <span id="carTaxYearly">-</span></strong>
        
        <!-- 月割り金額の表示エリア -->
        <div class="monthly-box">
            <strong>自動車税（種別割）月割り計算結果：</strong><br>
            <span id="carTaxMonthly">計算を実行するとここに結果が表示されます</span><br>
            <small style="color: #666;">※普通車は登録月の翌月から3月までの残り月数で計算します（100円未満切り捨て）。</small>
        </div>
    </div>

<script>
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
let currentYearlyTax = 0; // 自動車税の年額を保持する変数
let selectedFile = null;  // 選択されたファイルを保持する変数

// 1. 画像が選択されたらファイルを保持
document.getElementById("imageInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];
    if (selectedFile) {
        statusEl.innerText = "画像が選択されました。「税額を計算する」を押してください。";
    }
});

// 2. 実行ボタンが押された時に処理を開始
submitBtn.addEventListener("click", async function() {
    if (!selectedFile) {
        alert("車検証の画像を選択してください。");
        return;
    }
    
    // 連打防止・処理中の状態にする
    submitBtn.disabled = true;
    statusEl.innerText = "画像処理中...";
    
    const img = new Image();
    img.onload = async () => {
        try {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            // 白黒化（二値化）処理
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                const bw = gray > 170 ? 255 : 0;
                data[i] = bw; data[i+1] = bw; data[i+2] = bw;
            }
            ctx.putImageData(imageData, 0, 0);
            
            statusEl.innerText = "OCR実行中（文字を解析しています）...";
            
            const result = await Tesseract.recognize(canvas, "jpn+eng");
            const text = result.data.text;
            
            // テキストを解析して結果を表示
            parseData(text);
            
        } catch (err) {
            console.error(err);
            statusEl.innerText = "エラーが発生しました。別の画像で試してください。";
        } finally {
            // ボタンを元に戻す
            submitBtn.disabled = false;
        }
    };
    img.src = URL.createObjectURL(selectedFile);
});

// 登録月を変更したときもリアルタイムで月割りを再計算する機能
document.getElementById("monthSelect").addEventListener("change", function() {
    updateMonthlyDisplay();
});

// テキスト解析・結果反映
function parseData(text) {
    const clean = text
        .replace(/[—ー－]/g, "-")
        .replace(/\s+/g, " ")
        .toUpperCase();
        
    let model = "-";
    let firstReg = "-";
    let weight = 0;
    let ccValue = 0; // 排気量を数値で保持 (L単位)
    let isNewTaxRate = true; // 令和元年10月1日以降（新税率）かどうかのフラグ
    
    // 型式の抽出
    const modelMatch = clean.match(/(DBA|CBA|EBA|3BA|5BA)\s*-\s*[A-Z0-9]+/);
    if (modelMatch) {
        model = modelMatch[0].replace(/\s+/g, "");
    }
    
    // 初度登録の抽出
    const regMatch = clean.match(/(平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月/);
    if (regMatch) {
        firstReg = regMatch[0].replace(/\s+/g, "");
        const era = regMatch[1];
        const year = parseInt(regMatch[2]);
        const month = parseInt(regMatch[3]);
        
        // 令和元年(2019年)10月以降かどうかの判定
        if (era === "平成") {
            isNewTaxRate = false;
        } else if (era === "令和") {
            if (year === 1 && month < 10) {
                isNewTaxRate = false;
            }
        }
    }
    
    // 総排気量又は定格出力の抽出 (例: 1.49L や 1.99L など)
    const ccMatch = clean.match(/(\d+\.\d+)\s*L/);
    if (ccMatch) {
        ccValue = parseFloat(ccMatch[1]);
    }

    // 車両重量の抽出
    const nums = clean.match(/\d{4}/g) || [];
    nums.forEach(n => {
        const v = parseInt(n);
        if (v >= 700 && v <= 3000) {
            if (v > weight) { weight = v; }
        }
    });
    
    // 各種税額の計算
    const weightTaxAmount = getWeightTax(weight);
    currentYearlyTax = getCarTaxYearly(ccValue, isNewTaxRate);
    
    // 画面に値をセット
    document.getElementById("model").innerText = model;
    document.getElementById("firstReg").innerText = firstReg;
    document.getElementById("cc").innerText = ccValue ? ccValue + "L" : "-";
    document.getElementById("weight").innerText = weight ? weight + "kg" : "-";
    document.getElementById("weightTax").innerText = weightTaxAmount ? weightTaxAmount.toLocaleString() + "円" : "-";
    document.getElementById("carTaxYearly").innerText = currentYearlyTax ? currentYearlyTax.toLocaleString() + "円" : "-";
    
    // 月割り額の表示を更新
    updateMonthlyDisplay();
    statusEl.innerText = "読み取り完了";
}

// 月割り計算結果を画面に反映する関数
function updateMonthlyDisplay() {
    const selectEl = document.getElementById("monthSelect");
    const selectedMonth = parseInt(selectEl.value);
    const monthlyTaxEl = document.getElementById("carTaxMonthly");
    
    if (currentYearlyTax > 0) {
        const monthlyAmount = getCarTaxMonthly(currentYearlyTax, selectedMonth);
        let text = `<b style="font-size: 20px; color: #0066cc;">${selectedMonth}月登録の月割り額: ${monthlyAmount.toLocaleString()}円</b>`;
        if (selectedMonth === 3) {
            text = `<b style="font-size: 20px; color: #ff3333;">3月登録の月割り額: 0円</b> (当期分なし)`;
        }
        monthlyTaxEl.innerHTML = text;
    } else {
        monthlyTaxEl.innerText = "総排気量が読み取られると月割り額が計算されます";
    }
}

// 重量税の税額テーブル
function getWeightTax(weight) {
    if (weight <= 0) return 0;
    if (weight <= 500) return 8200;
    if (weight <= 1000) return 16400;
    if (weight <= 1500) return 24600;
    if (weight <= 2000) return 32800;
    if (weight <= 2500) return 41000;
    if (weight <= 3000) return 49200;
    return 0;
}

// 自動車税（種別割）年額テーブル (東京都主税局基準)
function getCarTaxYearly(cc, isNewTaxRate) {
    if (cc <= 0) return 0;

    if (isNewTaxRate) {
        // 令和元年10月1日以降に初回新規登録
        if (cc <= 1.0) return 25000;
        if (cc <= 1.5) return 30500;
        if (cc <= 2.0) return 36000;
        if (cc <= 2.5) return 43500;
        if (cc <= 3.0) return 50000;
        if (cc <= 3.5) return 57000;
        if (cc <= 4.0) return 65500;
        if (cc <= 4.5) return 75500;
        if (cc <= 6.0) return 87000;
        return 101000;
    } else {
        // 令和元年9月30日以前に初回新規登録
        if (cc <= 1.0) return 29500;
        if (cc <= 1.5) return 34500;
        if (cc <= 2.0) return 39500;
        if (cc <= 2.5) return 45000;
        if (cc <= 3.0) return 51000;
        if (cc <= 3.5) return 58000;
        if (cc <= 4.0) return 66500;
        if (cc <= 4.5) return 76500;
        if (cc <= 6.0) return 88000;
        return 111000;
    }
}

// 月割り自動車税の計算ロジック
function getCarTaxMonthly(yearlyAmount, month) {
    if (!yearlyAmount || !month) return 0;
    let remainingMonths = 12 - month;
    if (remainingMonths <= 0) return 0;
    
    const monthlyValue = (yearlyAmount * remainingMonths) / 12;
    return Math.floor(monthlyValue / 100) * 100;
}
</script>
</body>
</html>
