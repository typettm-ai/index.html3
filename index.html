<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>車検証税額チェッカー β</title>
    <!-- Tesseract.js（OCRライブラリ）の読み込み -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 700px;
            margin: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            font-size: 28px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,.08);
        }
        input {
            width: 100%;
            margin-top: 12px;
            box-sizing: border-box;
            padding: 10px;
        }
        .result {
            font-size: 18px;
            line-height: 2;
        }
        .status {
            font-weight: bold;
        }
        .monthly-box {
            background: #f0f7ff;
            border-left: 4px solid #0066cc;
            padding: 12px;
            margin-top: 12px;
            font-size: 16px;
            border-radius: 0 8px 8px 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <h1>車検証税額チェッカー β</h1>
    <p>
        画像は端末内のみで処理されます。<br>
        サーバーへ送信しません。
    </p>
    
    <input type="file" id="imageInput" accept="image/*">
    
    <div class="card">
        <div id="status" class="status">画像を選択してください</div>
    </div>

    <!-- 抽出された結果と税額だけを表示 -->
    <div class="card result">
        <h2>抽出結果</h2>
        型式： <span id="model">-</span> <br>
        初度登録： <span id="firstReg">-</span> <br>
        車両重量： <span id="weight">-</span> <br><br>
        
        <strong>重量税： <span id="weightTax">-</span></strong><br>
        <strong>自動車税（種別割）年額： <span id="carTaxYearly">-</span></strong>
        
        <!-- 月割り金額の表示エリア -->
        <div class="monthly-box">
            <strong>新規登録時の月割り税額（目安）：</strong><br>
            <span id="carTaxMonthly">初度登録月が読み取られると計算されます</span><br>
            <small style="color: #666;">※普通車は登録月の翌月から3月までの残り月数で計算（100円未満切り捨て）。軽自動車は月割制度がないため4月登録扱い以外は0円となります。</small>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById("status");

        document.getElementById("imageInput").addEventListener("change", async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            statusEl.innerText = "画像処理中...";
            const img = new Image();

            img.onload = async () => {
                try {
                    const canvas = document.createElement("canvas");
                    const ctx = canvas.getContext("2d");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // 白黒化（二値化）処理
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                        const bw = gray > 170 ? 255 : 0;
                        data[i] = bw;
                        data[i+1] = bw;
                        data[i+2] = bw;
                    }
                    ctx.putImageData(imageData, 0, 0);

                    statusEl.innerText = "OCR実行中...";
                    
                    const result = await Tesseract.recognize(canvas, "jpn+eng");
                    const text = result.data.text;

                    // 解析・税額判定ロジックへ
                    parseData(text);

                } catch (err) {
                    console.error(err);
                    statusEl.innerText = "エラーが発生しました";
                }
            };
            img.src = URL.createObjectURL(file);
        });

        // テキスト解析・画面表示関数
        function parseData(text) {
            const clean = text
                .replace(/[—ー－]/g, "-")
                .replace(/\s+/g, " ")
                .toUpperCase();

            let model = "-";
            let firstReg = "-";
            let weight = 0;
            let regMonth = null;

            // 型式の抽出
            const modelMatch = clean.match(/(DBA|CBA|EBA|3BA|5BA)\s*-\s*[A-Z0-9]+/);
            if (modelMatch) {
                model = modelMatch[0].replace(/\s+/g, "");
            }

            // 初度登録の抽出（月割計算のために「月」の数字も取得）
            const regMatch = clean.match(/(平成|令和)\s*(\d+)\s*年\s*(\d+)\s*月/);
            if (regMatch) {
                firstReg = regMatch[0].replace(/\s+/g, "");
                regMonth = parseInt(regMatch[3]); // 登録月（1〜12）
            }

            // 車両重量の抽出
            const nums = clean.match(/\d{4}/g) || [];
            nums.forEach(n => {
                const v = parseInt(n);
                if (v >= 700 && v <= 3000) {
                    if (v > weight) {
                        weight = v;
                    }
                }
            });

            // 各種税額の計算
            const weightTaxAmount = getWeightTax(weight);
            const carTaxYearlyAmount = getCarTaxYearly(weight); // 重量を仮の基準として自動車税を設定
            const carTaxMonthlyAmount = getCarTaxMonthly(carTaxYearlyAmount, regMonth);

            // 結果を画面に反映
            document.getElementById("model").innerText = model;
            document.getElementById("firstReg").innerText = firstReg;
            document.getElementById("weight").innerText = weight ? weight + "kg" : "-";
            
            document.getElementById("weightTax").innerText = weightTaxAmount ? weightTaxAmount.toLocaleString() + "円" : "-";
            document.getElementById("carTaxYearly").innerText = carTaxYearlyAmount ? carTaxYearlyAmount.toLocaleString() + "円" : "-";
            
            if (carTaxMonthlyAmount !== null && regMonth !== null) {
                document.getElementById("carTaxMonthly").innerHTML = `<b style="font-size: 20px; color: #0066cc;">${regMonth}月登録の場合: ${carTaxMonthlyAmount.toLocaleString()}円</b> (残り${12 - regMonth}ヶ月分)`;
            } else {
                document.getElementById("carTaxMonthly").innerText = "初度登録月が読み取られると計算されます";
            }
            
            statusEl.innerText = "読み取り完了";
        }

        // 重量税の税額テーブル
        function getWeightTax(weight) {
            if (weight <= 0) return 0;
            if (weight <= 500) return 8200;
            if (weight <= 1000) return 16400;
            if (weight <= 1500) return 24600;
            if (weight <= 2000) return 32800;
            if (weight <= 2500) return 41000;
            if (weight <= 3000) return 49200;
            return 0;
        }

        // 自動車税（種別割）年額テーブル
        // ※本来は排気量基準ですが、簡易チェッカーとして車両重量ベースで一般的な自家用乗用車の税額（2019年10月以降税率）を割り当てています
        function getCarTaxYearly(weight) {
            if (weight <= 0) return 0;
            if (weight <= 1000) return 25000;  // 1L以下（コンパクトカー等）
            if (weight <= 1500) return 30500;  // 1L超〜1.5L以下（プリウス・ヤリス等）
            if (weight <= 2000) return 36000;  // 1.5L超〜2.0L以下（ミニバン等）
            return 43500;                      // 2.0L超〜2.5L以下（大型セダン・SUV等）
        }

        // 月割り自動車税の計算ロジック
        function getCarTaxMonthly(yearlyAmount, month) {
            if (!yearlyAmount || !month) return null;
            
            // 登録月の翌月から3月までの残り月数を計算
            // 例: 4月登録なら5月〜翌3月の「11ヶ月分」
            let remainingMonths = 12 - month;
            
            if (remainingMonths <= 0) {
                return 0; // 3月登録の場合は翌年度からかかるため、当期月割りは0円
            }
            
            // 月割り計算（100円未満切り捨て）
            const monthlyValue = (yearlyAmount * remainingMonths) / 12;
            return Math.floor(monthlyValue / 100) * 100;
        }
    </script>
</body>
</html>
